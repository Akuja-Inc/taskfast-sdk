[package]
name = "taskfast-client"
version = "0.3.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Typed HTTP client for the TaskFast marketplace API (generated from spec/openapi.yaml)."
build = "build.rs"
publish = false

[lints]
workspace = true

[package.metadata.dist]
dist = false

[dependencies]
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
reqwest.workspace = true
tokio = { workspace = true }
tracing.workspace = true
progenitor-client = "0.9"
bytes = "1"
chrono = { version = "0.4", default-features = false, features = ["serde"] }
uuid.workspace = true
rand = "0.8"
regress = "0.10"
base64 = "0.22"
futures = { workspace = true }

[build-dependencies]
progenitor = "0.9"
openapiv3 = { version = "2", default-features = false }
prettyplease = "0.2"
syn = { version = "2", features = ["full"] }
serde_yaml.workspace = true
xtask = { path = "../../xtask", version = "0.6.0" }

[dev-dependencies]
wiremock = "0.6"
tokio = { workspace = true, features = ["macros", "rt"] }

# Deps below appear only in build.rs-generated code ($OUT_DIR/codegen.rs,
# produced by progenitor from spec/openapi.yaml). cargo-machete scans the
# source tree and can't see generated files — ignore here to avoid false
# positives. If the spec drops a type (e.g., base64/rand), leave the entry
# until the next release so re-adding it later is a one-line revert.
[package.metadata.cargo-machete]
ignored = ["progenitor-client", "bytes", "chrono", "regress", "futures", "rand", "base64"]
