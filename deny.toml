[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # paste — unmaintained, deep transitive of alloy/ark-* macro tree
    "RUSTSEC-2024-0436",
    # rand 0.8 — unsound only under custom-logger + thread_rng reseed race; not triggered here
    "RUSTSEC-2026-0097",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
