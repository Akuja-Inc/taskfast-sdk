version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      patch:
        patterns: ["*"]
        update-types: ["patch"]
      minor:
        patterns: ["*"]
        update-types: ["minor"]
    labels:
      - dependencies
      - triage

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]
    # release.yml is generated by cargo-dist; bumping these breaks `dist plan`
    # drift check. Regenerate via `dist init` on cargo-dist upgrade instead.
    # Note: also blocks bumps in ci.yml/docker.yml — bump manually when needed.
    ignore:
      - dependency-name: "actions/checkout"
      - dependency-name: "actions/upload-artifact"
      - dependency-name: "actions/download-artifact"
      - dependency-name: "actions/attest-build-provenance"
    labels:
      - dependencies
      - triage
