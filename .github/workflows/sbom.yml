name: SBOM

# Produces a CycloneDX SBOM on tag push and uploads it to the matching
# GitHub Release. Kept in its own file because release.yml is generated
# by cargo-dist (see dependabot.yml); editing that file breaks `dist plan`
# drift checks.

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sbom:
    name: cyclonedx
    runs-on: ubuntu-22.04
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        run: cargo cyclonedx --format json --all --output-cdx
      - name: Collect SBOM files
        run: |
          mkdir -p sbom-out
          find . -name '*.cdx.json' -not -path './target/*' -exec cp {} sbom-out/ \;
          ls -la sbom-out/
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom-out/*.cdx.json
          retention-days: 90
      - name: Attach SBOM to release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Wait briefly for release.yml to create the GitHub Release,
          # then attach the SBOM files. If the release doesn't exist
          # (e.g., cargo-dist hasn't finished), fail loudly.
          for i in 1 2 3 4 5; do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              gh release upload "$TAG" sbom-out/*.cdx.json --repo "$GITHUB_REPOSITORY" --clobber
              exit 0
            fi
            sleep 30
          done
          echo "::error::release $TAG not found after 2.5m; SBOM attach skipped"
          exit 1
