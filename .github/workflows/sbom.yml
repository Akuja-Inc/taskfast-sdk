name: SBOM

# Produces a CycloneDX SBOM and attaches it to the matching GitHub Release.
#
# Trigger: workflow_run on "Release" completion (not `release: [published]`,
# because cargo-dist's release.yml creates the release with GITHUB_TOKEN —
# GitHub's anti-loop protection blocks event-triggered workflows in that case;
# same reason docker.yml uses tag push).
#
# Using workflow_run avoids the previous poll-loop race (release.yml takes
# 9-12m to create the GitHub Release; a 2.5m poll in sbom.yml always lost).

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach SBOM to (e.g. taskfast-cli-v0.4.1)"
        required: true

permissions:
  contents: write

jobs:
  sbom:
    name: cyclonedx
    # Only run for successful, tag-triggered Release runs (skip PR runs of release.yml).
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.event == 'push' &&
           startsWith(github.event.workflow_run.head_branch, 'taskfast-cli-v')) }}
    runs-on: ubuntu-22.04
    env:
      TAG: ${{ github.event.workflow_run.head_branch || inputs.tag }}
      REF: ${{ github.event.workflow_run.head_sha || inputs.tag }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.REF }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo install cargo-cyclonedx --locked --version ^0.5
      - name: Generate SBOM
        run: cargo cyclonedx --format json --all
      - name: Collect SBOM files
        run: |
          mkdir -p sbom-out
          find . -name '*.cdx.json' -not -path './target/*' -exec cp {} sbom-out/ \;
          ls -la sbom-out/
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom-out/*.cdx.json
          retention-days: 90
      - name: Attach SBOM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG" sbom-out/*.cdx.json --repo "$GITHUB_REPOSITORY" --clobber
