name: Docker

# Trigger on tag push, not `release: [published]`.
#
# cargo-dist's release.yml creates the GitHub Release via `gh release create`
# using the default GITHUB_TOKEN. GitHub's anti-loop protection blocks
# workflow events triggered by GITHUB_TOKEN — so `release: [published]`
# never fires this workflow, and no container image has been published since
# v0.2.0 (when release-plz still used a PAT).
#
# Use the same tag pattern release.yml uses so both pipelines trigger off
# the same event.
on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

# Guard against rapid-fire bumps racing the `latest` tag (e.g. two releases
# within minutes). Later-arriving tag push wins; older in-flight builds are
# cancelled before they can overwrite `latest` with stale content.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Strip the `taskfast-cli-v` cargo-dist prefix from the tag to get the
      # bare semver string passed to the Dockerfile build-arg.
      - name: Extract version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          V="${REF_NAME#taskfast-cli-v}"
          if [ -z "$V" ] || [ "$V" = "$REF_NAME" ]; then
            echo "could not parse semver from ref_name: $REF_NAME" >&2
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      # The Dockerfile fetches binaries from the GitHub Release produced by
      # release.yml (cargo-dist). Both workflows trigger off the same tag push,
      # so release.yml may not have uploaded assets yet. Poll until they exist.
      # 60 attempts × 20s = 20min ceiling (cargo-dist runs typically 5–15min).
      - name: Wait for release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          for i in $(seq 1 60); do
            if gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null \
              | grep -q '^taskfast-cli-x86_64-unknown-linux-gnu.tar.xz$'; then
              echo "assets ready on attempt $i"
              exit 0
            fi
            echo "attempt $i/60: assets not ready, sleeping 20s"
            sleep 20
          done
          echo "timeout waiting for release assets on $TAG" >&2
          exit 1

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Our tags are prefixed (`taskfast-cli-v0.2.2` — cargo-dist Singular
          # Announcement format), so `type=semver` fails to parse them.
          # `type=match` extracts the semver portion via regex instead.
          tags: |
            type=match,pattern=\d+\.\d+\.\d+,group=0
            type=match,pattern=(\d+\.\d+)\.\d+,group=1
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v3.10.1

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-discord:
    name: Notify Discord
    if: ${{ always() }}
    needs:
      - build-and-push
    runs-on: ubuntu-22.04
    permissions:
      actions: read
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      DOCKER_RESULT: ${{ needs.build-and-push.result }}
    steps:
      - name: Compute release summary
        id: summary
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          format_duration() {
            local total_seconds=$1
            local hours=$((total_seconds / 3600))
            local minutes=$(((total_seconds % 3600) / 60))
            local seconds=$((total_seconds % 60))
            printf '%02dh %02dm %02ds' "$hours" "$minutes" "$seconds"
          }

          run_started_at=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" --jq '.run_started_at')
          start_epoch=$(date -d "$run_started_at" +%s)
          now_epoch=$(date +%s)
          duration=$(format_duration $((now_epoch - start_epoch)))

          if [[ "$DOCKER_RESULT" == "success" ]]; then
            status="passed"
            emoji="✅"
          else
            status="failed"
            emoji="❌"
          fi

          # Strip cargo-dist tag prefix to get bare semver; non-tag refs (workflow_dispatch from a branch) pass through unchanged.
          version="${REF_NAME#taskfast-cli-v}"

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "emoji=$emoji" >> "$GITHUB_OUTPUT"
          echo "duration=$duration" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Actions for Discord
        if: ${{ env.DISCORD_WEBHOOK != '' }}
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ env.DISCORD_WEBHOOK }}
        with:
          args: |
            ${{ steps.summary.outputs.emoji }} Release ${{ steps.summary.outputs.status }} for `${{ github.repository }}`
            `Tag     :` [${{ github.ref_name }}](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})
            `SHA     :` [`${{ steps.summary.outputs.sha_short }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            `Docker  :` [`ghcr.io/${{ github.repository }}:${{ steps.summary.outputs.version }}`](https://github.com/${{ github.repository }}/pkgs/container/${{ github.event.repository.name }}) (`${{ env.DOCKER_RESULT }}`)
            `Homebrew:` [Akuja-Inc/homebrew-taskfast](https://github.com/Akuja-Inc/homebrew-taskfast)
            `Duration:` `${{ steps.summary.outputs.duration }}`
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
