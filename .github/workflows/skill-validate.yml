name: skill-validate

on:
  pull_request:
    paths:
      - 'skills/taskfast-agent/**'
      - 'scripts/validate-skill.sh'
      - '.github/workflows/skill-validate.yml'
  push:
    branches: [main]
    paths:
      - 'skills/taskfast-agent/**'
      - 'scripts/validate-skill.sh'
      - '.github/workflows/skill-validate.yml'

jobs:
  validate:
    name: validate taskfast-agent skill
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: '22'
      - name: Run skill validator
        env:
          DISABLE_TELEMETRY: '1'
        run: ./scripts/validate-skill.sh
