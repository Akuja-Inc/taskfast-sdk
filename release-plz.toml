[workspace]
changelog_update = true
git_release_enable = false
publish = false
semver_check = false

[[package]]
name = "taskfast-cli"
# cargo-dist owns tag/release; no crates.io publish. release-plz can't
# compute diffs without a registry baseline, so skip release for this crate.
release = false
changelog_include = ["taskfast-cli"]

[[package]]
name = "taskfast-agent"
release = false

[[package]]
name = "taskfast-client"
release = false

[[package]]
name = "taskfast-chains"
release = false
